apiVersion: v1
kind: ConfigMap
metadata:
  name: lavalink-config
  namespace: botmusica
data:
  application.yml: |
    server:
      port: ${SERVER_PORT:2333}

    lavalink:
      server:
        password: ${LAVALINK_SERVER_PASSWORD:youshallnotpass}
        sources:
          youtube: false
          bandcamp: true
          soundcloud: true
          twitch: true
          vimeo: true
          http: true
          local: false
      plugins:
        - dependency: "dev.lavalink.youtube:youtube-plugin:${YOUTUBE_PLUGIN_VERSION:1.18.0}"
          snapshot: false

    plugins:
      youtube:
        enabled: true
        allowSearch: true
        allowDirectVideoIds: true
        allowDirectPlaylistIds: true
        clients:
          - MUSIC
          - WEB
          - ANDROID_VR
