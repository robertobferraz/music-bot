apiVersion: apps/v1
kind: Deployment
metadata:
  name: lavalink
  namespace: botmusica
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: lavalink
  template:
    metadata:
      labels:
        app: lavalink
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: lavalink
          image: ghcr.io/lavalink-devs/lavalink:4
          imagePullPolicy: IfNotPresent
          env:
            - name: _JAVA_OPTIONS
              value: -Xmx2048M
            - name: SERVER_PORT
              value: '2333'
            - name: YOUTUBE_PLUGIN_VERSION
              value: '1.18.0'
            - name: LAVASRC_PLUGIN_VERSION
              value: '4.8.1'
            - name: LAVASEARCH_PLUGIN_VERSION
              value: '1.0.0'
            - name: SPONSORBLOCK_PLUGIN_VERSION
              value: '3.0.1'
            - name: LAVALYRICS_PLUGIN_VERSION
              value: '1.1.0'
            - name: LAVALINK_SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: botmusica-secret
                  key: LAVALINK_PASSWORD
            - name: SPOTIFY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: botmusica-secret
                  key: SPOTIFY_CLIENT_ID
                  optional: true
            - name: SPOTIFY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: botmusica-secret
                  key: SPOTIFY_CLIENT_SECRET
                  optional: true
            - name: SPOTIFY_SP_DC
              valueFrom:
                secretKeyRef:
                  name: botmusica-secret
                  key: SPOTIFY_SP_DC
                  optional: true
            - name: SPOTIFY_COUNTRY_CODE
              value: 'US'
            - name: SPOTIFY_CUSTOM_TOKEN_ENDPOINT
              value: 'http://spotify-tokener:7080/api/token'
          ports:
            - containerPort: 2333
              name: lavalink
          readinessProbe:
            tcpSocket:
              port: lavalink
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: lavalink
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          startupProbe:
            tcpSocket:
              port: lavalink
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: '250m'
              memory: '1024Mi'
            limits:
              cpu: '1000m'
              memory: '2048Mi'
          volumeMounts:
            - name: lavalink-config
              mountPath: /opt/Lavalink/application.yml
              subPath: application.yml
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
      volumes:
        - name: lavalink-config
          configMap:
            name: lavalink-config
