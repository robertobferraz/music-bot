services:
  botmusica:
    build: .
    container_name: botmusica
    init: true
    restart: unless-stopped
    stop_grace_period: 25s
    env_file:
      - .env
    environment:
      BOT_DB_PATH: /data/botmusica.db
      WEB_PANEL_ENABLED: '${WEB_PANEL_ENABLED:-false}'
      WEB_PANEL_HOST: '${WEB_PANEL_HOST:-0.0.0.0}'
      WEB_PANEL_PORT: '${WEB_PANEL_PORT:-8080}'
      BOT_HEALTHCHECK_ENABLED: '${BOT_HEALTHCHECK_ENABLED:-true}'
      BOT_HEALTHCHECK_HOST: '${BOT_HEALTHCHECK_HOST:-0.0.0.0}'
      BOT_HEALTHCHECK_PORT: '${BOT_HEALTHCHECK_PORT:-8090}'
      YTDLP_JS_RUNTIME: 'node:/usr/bin/node'
    volumes:
      - './data:/data'
    ports:
      - '127.0.0.1:18080:8080'
      - '127.0.0.1:18090:8090'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.botmusica.rule=Host(`panel.robertobferraz.dev`)"
      - "traefik.http.routers.botmusica.entrypoints=https"
      - "traefik.http.routers.botmusica.tls=true"
      - "traefik.http.routers.botmusica.tls.certresolver=letsencrypt"
      - "traefik.http.services.botmusica.loadbalancer.server.port=8080"
    healthcheck:
      test:
        - CMD-SHELL
        - 'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8090/health'', timeout=2).read()"'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - music-network
      - coolify
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  postgres:
    image: 'postgres:16-alpine'
    container_name: botmusica-postgres
    restart: unless-stopped
    stop_grace_period: 25s
    environment:
      POSTGRES_DB: botmusica
      POSTGRES_USER: botmusica
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    volumes:
      - './data/postgres:/var/lib/postgresql/data'
    ports:
      - '127.0.0.1:55432:5432'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U botmusica -d botmusica -h 127.0.0.1 -p 5432'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - music-network
      - coolify
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

networks:
  music-network:
    external: true
  coolify:
    external: true
